name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: uv run python -m build
      - run: uv run pip-audit
      - name: Validate tracked-file policy
        run: >-
          uv run python -c "import subprocess;
          from gemini_trading.safety.repository_policy import validate_tracked_paths;
          validate_tracked_paths(subprocess.check_output(['git','ls-files'], text=True).splitlines())"
      - name: Scan tracked files for secrets
        run: uv run pre-commit run detect-secrets --all-files

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
