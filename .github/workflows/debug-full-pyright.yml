name: Debug Full Pyright

# Temporary diagnostic; remove after the current full-project type findings are captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-full-pyright:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture current full Pyright output
        shell: bash
        run: |
          set +e
          uv run pyright > full-pyright-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> full-pyright-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: full-pyright-output
          path: full-pyright-output.txt
          if-no-files-found: error
          retention-days: 1
