name: Debug Ruff Output

# Temporary diagnostic workflow; remove after the current lint defect is isolated.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-ruff:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          uv run ruff check . > ruff-output.txt 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> ruff-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt
          if-no-files-found: error
          retention-days: 1
