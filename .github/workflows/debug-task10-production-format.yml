name: Debug Task 10 Production Format

# Temporary Task 10 diagnostic; remove after the exact production formatter diff is captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task10-production-format:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 10 production formatter diff
        shell: bash
        run: |
          uv run ruff format src/gemini_trading/research/metrics.py src/gemini_trading/research/artifacts.py
          git diff -- src/gemini_trading/research/metrics.py src/gemini_trading/research/artifacts.py > task10-production-format.diff
      - uses: actions/upload-artifact@v4
        with:
          name: task10-production-format
          path: task10-production-format.diff
          if-no-files-found: error
          retention-days: 1
