name: Debug Task 11 Ruff

# Temporary Task 11 diagnostic; remove after exact lint findings are captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task11-ruff:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 11 Ruff output
        shell: bash
        run: |
          set +e
          uv run ruff check tests/research_fixture_support.py tests/integration/test_backtest_replay_without_network.py tests/unit/research/test_verification.py tests/regression/test_tampered_backtest_artifacts.py tests/unit/research/test_artifacts.py --output-format=full > task11-ruff-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> task11-ruff-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: task11-ruff-output
          path: task11-ruff-output.txt
          if-no-files-found: error
          retention-days: 1
