name: Debug Task 7 Format

# Temporary Task 7 diagnostic; remove after the exact formatter diff is captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task7-format:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 7 formatter diff
        shell: bash
        run: |
          uv run ruff format src/gemini_trading/research/accounting.py tests/unit/research/test_accounting.py tests/property/test_accounting_invariants.py
          git diff -- src/gemini_trading/research/accounting.py tests/unit/research/test_accounting.py tests/property/test_accounting_invariants.py > task7-format.diff
      - uses: actions/upload-artifact@v4
        with:
          name: task7-format
          path: task7-format.diff
          if-no-files-found: error
          retention-days: 1
