name: Debug Task 7 Ruff

# Temporary Task 7 diagnostic; remove after the exact lint finding is captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task7-ruff:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 7 Ruff output
        shell: bash
        run: |
          set +e
          uv run ruff check tests/unit/research/test_accounting.py tests/property/test_accounting_invariants.py --output-format=full > task7-ruff-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> task7-ruff-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: task7-ruff-output
          path: task7-ruff-output.txt
          if-no-files-found: error
          retention-days: 1
