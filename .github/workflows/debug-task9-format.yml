name: Debug Task 9 Format

# Temporary Task 9 diagnostic; remove after the exact formatter diff is captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task9-format:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 9 formatter diff
        shell: bash
        run: |
          uv run ruff format tests/unit/research/test_engine.py tests/integration/test_backtest_event_order.py tests/regression/test_duplicate_cycle_idempotency.py
          git diff -- tests/unit/research/test_engine.py tests/integration/test_backtest_event_order.py tests/regression/test_duplicate_cycle_idempotency.py > task9-format.diff
      - uses: actions/upload-artifact@v4
        with:
          name: task9-format
          path: task9-format.diff
          if-no-files-found: error
          retention-days: 1
