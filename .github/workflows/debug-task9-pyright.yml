name: Debug Task 9 Pyright

# Temporary Task 9 diagnostic; remove after the remaining type findings are captured.
on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-task9-pyright:
    if: github.event.pull_request.number == 13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.10.0"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture remaining Task 9 Pyright output
        shell: bash
        run: |
          set +e
          uv run pyright src/gemini_trading/research/engine.py src/gemini_trading/research/contracts.py src/gemini_trading/research/fixture_strategy.py tests/unit/research/test_engine.py tests/integration/test_backtest_event_order.py tests/regression/test_duplicate_cycle_idempotency.py > task9-pyright-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> task9-pyright-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: task9-pyright-output
          path: task9-pyright-output.txt
          if-no-files-found: error
          retention-days: 1
