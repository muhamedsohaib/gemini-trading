name: Repair Market Data progress report EOF

on:
  pull_request:
    paths:
      - ".github/workflows/repair-market-data-progress-eof.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Synchronize frozen dependencies
        run: uv sync --all-groups --frozen

      - name: Apply only the verified EOF repair
        shell: bash
        run: |
          set +e
          uv run pre-commit run end-of-file-fixer --files reports/verification/market-data-core-progress.md
          hook_status=$?
          set -e
          test "$hook_status" -eq 1
          test "$(git diff --name-only)" = "reports/verification/market-data-core-progress.md"
          uv run pre-commit run end-of-file-fixer --files reports/verification/market-data-core-progress.md

      - name: Remove temporary repair workflow and commit
        shell: bash
        run: |
          rm .github/workflows/repair-market-data-progress-eof.yml
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' '.github/workflows/repair-market-data-progress-eof.yml' 'reports/verification/market-data-core-progress.md' | sort)"
          test "$changed" = "$expected"
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/repair-market-data-progress-eof.yml reports/verification/market-data-core-progress.md
          git commit -m "docs: normalize Market Data progress report EOF"
          git push origin "HEAD:${{ github.head_ref }}"
