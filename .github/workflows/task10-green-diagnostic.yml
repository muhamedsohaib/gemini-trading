name: Task 10 GREEN Diagnostic 2

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 10 correction outputs
        run: |
          set +e
          mkdir -p task10-diagnostic
          python - <<'PY' > task10-diagnostic/transform.txt 2>&1
          from pathlib import Path

          unit = Path("tests/unit/cli/test_market_data.py")
          content = unit.read_text(encoding="utf-8")
          content = content.replace(
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import cast\n",
              1,
          )
          content = content.replace(
              "    value = json.loads(text)\n    assert isinstance(value, dict)\n    return value\n",
              "    value: object = json.loads(text)\n    assert isinstance(value, dict)\n    return cast(dict[str, object], value)\n",
              1,
          )
          content = content.replace(
              "    error = payload[\"error\"]\n    assert isinstance(error, dict)\n    assert error[\"type\"] == \"CliUsageError\"\n    message = error[\"message\"]\n",
              "    error_value = payload[\"error\"]\n    assert isinstance(error_value, dict)\n    error = cast(dict[str, object], error_value)\n    assert error[\"type\"] == \"CliUsageError\"\n    message: object = error[\"message\"]\n",
              1,
          )
          unit.write_text(content, encoding="utf-8")

          acceptance = Path("tests/acceptance/test_market_data_cli.py")
          content = acceptance.read_text(encoding="utf-8")
          content = content.replace(
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import cast\n",
              1,
          )
          content = content.replace(
              "    decoded = json.loads(text)\n    assert isinstance(decoded, dict)\n    return decoded\n",
              "    decoded: object = json.loads(text)\n    assert isinstance(decoded, dict)\n    return cast(dict[str, object], decoded)\n",
              1,
          )
          content = content.replace(
              "    configuration = tomllib.loads((project_root / \"pyproject.toml\").read_text(encoding=\"utf-8\"))\n    project = configuration[\"project\"]\n    assert isinstance(project, dict)\n    scripts = project[\"scripts\"]\n    assert isinstance(scripts, dict)\n",
              "    configuration_value: object = tomllib.loads(\n        (project_root / \"pyproject.toml\").read_text(encoding=\"utf-8\")\n    )\n    assert isinstance(configuration_value, dict)\n    configuration = cast(dict[str, object], configuration_value)\n    project_value = configuration[\"project\"]\n    assert isinstance(project_value, dict)\n    project = cast(dict[str, object], project_value)\n    scripts_value = project[\"scripts\"]\n    assert isinstance(scripts_value, dict)\n    scripts = cast(dict[str, object], scripts_value)\n",
              1,
          )
          content = content.replace(
              "    error = payload[\"error\"]\n    assert isinstance(error, dict)\n    assert error[\"type\"] == \"UnsafeExecutionModeError\"\n    assert \"only research and paper are allowed\" in str(error[\"message\"])\n",
              "    error_value = payload[\"error\"]\n    assert isinstance(error_value, dict)\n    error = cast(dict[str, object], error_value)\n    assert error[\"type\"] == \"UnsafeExecutionModeError\"\n    message: object = error[\"message\"]\n    assert \"only research and paper are allowed\" in str(message)\n",
              1,
          )
          acceptance.write_text(content, encoding="utf-8")
          print("transform complete")
          PY
          echo "transform_exit=$?" >> task10-diagnostic/transform.txt
          uv run ruff format src/gemini_trading/cli tests/unit/cli tests/acceptance/test_market_data_cli.py > task10-diagnostic/ruff-format.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/ruff-format.txt
          uv run ruff check src/gemini_trading/cli tests/unit/cli tests/acceptance/test_market_data_cli.py > task10-diagnostic/ruff-check.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/ruff-check.txt
          uv run pyright > task10-diagnostic/pyright.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/pyright.txt
          uv run pytest tests/unit/cli tests/acceptance/test_market_data_cli.py -q > task10-diagnostic/focused-pytest.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/focused-pytest.txt
          uv run pytest -q > task10-diagnostic/full-pytest.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/full-pytest.txt
          uv run gemini-trading --help > task10-diagnostic/help.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/help.txt
          uv run gemini-trading market-data --help > task10-diagnostic/market-help.txt 2>&1
          echo "exit=$?" >> task10-diagnostic/market-help.txt
          exit 0
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task10-green-diagnostic-2
          path: task10-diagnostic
          if-no-files-found: error
          retention-days: 1
