name: Task 10 GREEN Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture strict Pyright output
        run: uv run pyright > task10-green-pyright.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task10-green-pyright
          path: task10-green-pyright.txt
          if-no-files-found: error
          retention-days: 1
