name: Task 11 diagnostics

on:
  push:
    branches:
      - feature/candidate-multi-model-strategy-v0-1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture strict Pyright
        run: uv run pyright > task11-pyright.txt 2>&1 || true
      - name: Capture focused Task 11 tests
        run: uv run pytest tests/unit/cli/test_strategy.py tests/acceptance/test_strategy_cli.py -v > task11-pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: task11-diagnostics
          path: |
            task11-pyright.txt
            task11-pytest.txt
