name: Task 12 acceptance evidence

on:
  push:
    branches:
      - feature/candidate-multi-model-strategy-v0-1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Run deterministic acceptance first time
        env:
          GEMINI_TRADING_MODE: research
          PYTHONPATH: src:tests
          DD_TRACE_ENABLED: "false"
        run: >-
          uv run pytest
          tests/acceptance/test_candidate_strategy_end_to_end.py
          -v > pytest-acceptance-1.txt
      - name: Run deterministic acceptance second time
        env:
          GEMINI_TRADING_MODE: research
          PYTHONPATH: src:tests
          DD_TRACE_ENABLED: "false"
        run: >-
          uv run pytest
          tests/acceptance/test_candidate_strategy_end_to_end.py
          -v > pytest-acceptance-2.txt
      - name: Capture first exact acceptance receipt
        env:
          GEMINI_TRADING_MODE: research
          PYTHONPATH: src:tests
          DD_TRACE_ENABLED: "false"
        run: >-
          uv run python tests/candidate_strategy_e2e_worker.py
          /tmp/candidate-acceptance-1
          "$GITHUB_WORKSPACE"
          tests/fixtures/strategy/candidate-v0.1-config.json
          > acceptance-1.json
      - name: Capture second exact acceptance receipt
        env:
          GEMINI_TRADING_MODE: research
          PYTHONPATH: src:tests
          DD_TRACE_ENABLED: "false"
        run: >-
          uv run python tests/candidate_strategy_e2e_worker.py
          /tmp/candidate-acceptance-2
          "$GITHUB_WORKSPACE"
          tests/fixtures/strategy/candidate-v0.1-config.json
          > acceptance-2.json
      - name: Require identical acceptance identities and hashes
        run: diff -u acceptance-1.json acceptance-2.json > acceptance-diff.txt
      - name: Capture exact milestone evidence
        run: |
          uv run pytest --collect-only -q > pytest-collect.txt
          sha256sum uv.lock > uv-lock-sha256.txt
          git rev-parse HEAD > exact-head.txt
          python - <<'PY'
          import json
          from pathlib import Path

          receipt = json.loads(Path("acceptance-1.json").read_text())
          study_id = receipt["study_id"]
          root = Path("/tmp/candidate-acceptance-1") / "data" / "strategy-studies" / study_id
          evidence = {
              "acceptance": receipt,
              "promotion_gates": json.loads((root / "promotion-gates.json").read_text()),
              "limitations": json.loads((root / "limitations.json").read_text()),
              "study_manifest": json.loads((root / "study-manifest.json").read_text()),
              "study_result_manifest": json.loads((root / "study-result-manifest.json").read_text()),
          }
          Path("candidate-final-evidence.json").write_text(
              json.dumps(evidence, separators=(",", ":"), sort_keys=True) + "\n"
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: candidate-task12-acceptance-evidence
          path: |
            acceptance-1.json
            acceptance-2.json
            acceptance-diff.txt
            candidate-final-evidence.json
            exact-head.txt
            pytest-acceptance-1.txt
            pytest-acceptance-2.txt
            pytest-collect.txt
            uv-lock-sha256.txt
