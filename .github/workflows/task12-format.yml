name: Task 12 diagnostics

on:
  push:
    branches:
      - feature/candidate-multi-model-strategy-v0-1
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Format touched Task 12 files
        run: >-
          uv run ruff format
          src/gemini_trading/strategy/study_strategy.py
          src/gemini_trading/strategy/study_predictions.py
          src/gemini_trading/strategy/study_execution.py
          src/gemini_trading/strategy/study_plans.py
          src/gemini_trading/strategy/evaluator.py
          src/gemini_trading/cli/strategy.py
          tests/candidate_strategy_e2e_worker.py
          tests/acceptance/test_candidate_strategy_end_to_end.py
      - name: Capture strict Pyright
        run: uv run pyright > task12-pyright.txt 2>&1 || true
      - name: Capture focused acceptance
        run: uv run pytest tests/acceptance/test_candidate_strategy_end_to_end.py tests/acceptance/test_candidate_strategy_documentation.py -v > task12-pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: task12-diagnostics
          path: |
            src/gemini_trading/strategy/study_strategy.py
            src/gemini_trading/strategy/study_predictions.py
            src/gemini_trading/strategy/study_execution.py
            src/gemini_trading/strategy/study_plans.py
            src/gemini_trading/strategy/evaluator.py
            src/gemini_trading/cli/strategy.py
            tests/candidate_strategy_e2e_worker.py
            tests/acceptance/test_candidate_strategy_end_to_end.py
            task12-pyright.txt
            task12-pytest.txt
