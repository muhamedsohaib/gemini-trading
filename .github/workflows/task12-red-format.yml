name: Task 12 RED Format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: |
          uv run ruff format tests/acceptance/test_market_data_documentation.py
          uv run ruff check tests/acceptance/test_market_data_documentation.py --fix
          uv run ruff format --check tests/acceptance/test_market_data_documentation.py
          uv run ruff check tests/acceptance/test_market_data_documentation.py
          rm -f .github/workflows/task12-red-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/acceptance/test_market_data_documentation.py .github/workflows/task12-red-format.yml
          git commit -m "style: normalize Task 12 documentation test"
          git push origin HEAD:${{ github.head_ref }}
