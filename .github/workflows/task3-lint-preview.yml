name: Task 3 Lint Preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply Ruff fixes and capture remaining diagnostics
        shell: bash
        run: |
          uv run ruff check \
            tests/unit/data/validation/test_candles.py \
            tests/property/test_candle_validation.py \
            --fix --unsafe-fixes || true
          uv run ruff format \
            tests/unit/data/validation/test_candles.py \
            tests/property/test_candle_validation.py
          uv run ruff check \
            tests/unit/data/validation/test_candles.py \
            tests/property/test_candle_validation.py \
            > ruff-check.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task3-lint-preview
          path: |
            tests/unit/data/validation/test_candles.py
            tests/property/test_candle_validation.py
            ruff-check.txt
          if-no-files-found: error
          retention-days: 1
