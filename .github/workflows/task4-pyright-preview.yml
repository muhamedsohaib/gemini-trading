name: Task 4 Pyright Preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  pyright-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Pyright output
        run: uv run pyright > pyright.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task4-pyright-output
          path: pyright.txt
          if-no-files-found: error
          retention-days: 1
