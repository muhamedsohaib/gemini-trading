name: Task 5 Green Preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  green-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply repository-pinned Ruff
        run: |
          uv run ruff format src/gemini_trading/data/providers
          uv run ruff check --fix src/gemini_trading/data/providers
          uv run ruff format src/gemini_trading/data/providers
          uv run ruff check src/gemini_trading/data/providers
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task5-green-provider-files
          path: |
            src/gemini_trading/data/providers/__init__.py
            src/gemini_trading/data/providers/base.py
            src/gemini_trading/data/providers/http.py
            src/gemini_trading/data/providers/binance_spot.py
          if-no-files-found: error
          retention-days: 1
