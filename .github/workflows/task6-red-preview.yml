name: Task 6 RED Preview

on:
  pull_request:

permissions:
  contents: read

jobs:
  red-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply repository-pinned Ruff
        run: |
          uv run ruff format tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
          uv run ruff check --fix tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task6-red-tests
          path: |
            tests/unit/data/storage/test_local_immutable.py
            tests/property/test_immutable_storage.py
          if-no-files-found: error
          retention-days: 1
