name: Task 6 RED Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  red-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Format, fix diagnostics, and commit clean RED tests
        run: |
          uv run ruff format tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/unit/data/storage/test_local_immutable.py")
          text = path.read_text()
          text = text.replace('match="page-000001.json"', 'match=r"page-000001\\.json"')
          text = text.replace('match="candles.jsonl"', 'match=r"candles\\.jsonl"')
          text = text.replace('match="run-001.json"', 'match=r"run-001\\.json"')
          path.write_text(text)
          PY
          uv run ruff format tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
          uv run ruff check tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
          git rm .github/workflows/task6-red-preview.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/data/storage/test_local_immutable.py tests/property/test_immutable_storage.py
          git commit -m "test: normalize immutable storage RED suite"
          git push origin HEAD:${{ github.head_ref }}
