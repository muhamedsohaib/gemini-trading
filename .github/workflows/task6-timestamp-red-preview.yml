name: Task 6 Timestamp Green Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  timestamp-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Preserve sub-millisecond timestamps and verify
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/gemini_trading/data/storage/local_immutable.py")
          text = path.read_text()
          old = (
              'def _format_datetime(value: datetime) -> str:\n'
              '    return value.isoformat(timespec="milliseconds").replace("+00:00", "Z")\n'
          )
          new = (
              'def _format_datetime(value: datetime) -> str:\n'
              '    timespec = "milliseconds" if value.microsecond % 1000 == 0 else "microseconds"\n'
              '    return value.isoformat(timespec=timespec).replace("+00:00", "Z")\n'
          )
          if old not in text:
              raise SystemExit("expected datetime formatter not found")
          path.write_text(text.replace(old, new))
          PY
          uv run ruff format src/gemini_trading/data/storage tests/unit/data/storage tests/property/test_immutable_storage.py
          uv run ruff check src/gemini_trading/data/storage tests/unit/data/storage tests/property/test_immutable_storage.py
          uv run pyright
          uv run pytest tests/unit/data/storage tests/property/test_immutable_storage.py tests/unit/data/normalization tests/unit/data/validation tests/regression tests/unit/safety -q
          git rm .github/workflows/task6-timestamp-red-preview.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/data/storage tests/unit/data/storage
          git commit -m "fix: preserve storage timestamp precision"
          git push origin HEAD:${{ github.head_ref }}
