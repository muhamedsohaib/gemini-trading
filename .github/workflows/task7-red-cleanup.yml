name: Task 7 RED Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  red-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Format and commit clean Task 7 RED tests
        run: |
          uv run ruff format tests/unit/data/datasets/test_canonical_writer.py tests/property/test_dataset_identity.py
          uv run ruff check --fix tests/unit/data/datasets/test_canonical_writer.py tests/property/test_dataset_identity.py
          uv run ruff format --check tests/unit/data/datasets/test_canonical_writer.py tests/property/test_dataset_identity.py
          uv run ruff check tests/unit/data/datasets/test_canonical_writer.py tests/property/test_dataset_identity.py
          git rm .github/workflows/task7-red-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/data/datasets/test_canonical_writer.py tests/property/test_dataset_identity.py
          git commit -m "test: normalize Task 7 RED suite"
          git push origin HEAD:${{ github.head_ref }}
