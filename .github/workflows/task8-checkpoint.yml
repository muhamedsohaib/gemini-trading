name: Task 8 Checkpoint

on:
  pull_request:

permissions:
  contents: read

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Run Task 8 checkpoint
        run: |
          uv run pytest tests/unit/data/ingestion tests/unit/data tests/property tests/regression tests/unit/safety -q
          uv run pre-commit run --all-files
          uv run pyright
          rm -rf dist
          uv run python -m build
          uv run pip-audit
          uv run python -c "import subprocess; from gemini_trading.safety.repository_policy import validate_tracked_paths; validate_tracked_paths(subprocess.check_output(['git','ls-files'], text=True).splitlines()); print('PASS: tracked-file policy')"
          if GEMINI_TRADING_MODE=live uv run python -c "from gemini_trading.safety.execution_mode import load_runtime_policy; load_runtime_policy()"; then
            echo "live mode accepted" >&2
            exit 1
          else
            echo "PASS: live mode rejected"
          fi
          git diff --check
          test -z "$(git status --short)"
