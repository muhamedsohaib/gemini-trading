name: Task 8 GREEN Verification Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply candidate correction and capture outputs
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/gemini_trading/data/ingestion/service.py")
          content = path.read_text()
          old = """lambda: self._provider.fetch_klines(
                          request,
                          cursor,
                          self._page_limit,
                      )"""
          new = """lambda current_cursor=cursor: self._provider.fetch_klines(
                          request,
                          current_cursor,
                          self._page_limit,
                      )"""
          if old not in content:
              raise SystemExit("expected cursor lambda not found")
          path.write_text(content.replace(old, new, 1))
          PY
          uv run ruff format src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion --fix > task8-ruff.txt 2>&1 || true
          uv run ruff format --check src/gemini_trading/data/ingestion tests/unit/data/ingestion >> task8-ruff.txt 2>&1 || true
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion >> task8-ruff.txt 2>&1 || true
          uv run pyright > task8-pyright.txt 2>&1 || true
          uv run pytest tests/unit/data/ingestion tests/unit/data/datasets tests/unit/data/storage tests/unit/data/validation tests/property tests/regression tests/unit/safety -q > task8-pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task8-green-verification-diagnostic
          path: |
            src/gemini_trading/data/ingestion
            tests/unit/data/ingestion
            task8-ruff.txt
            task8-pyright.txt
            task8-pytest.txt
          if-no-files-found: error
          retention-days: 1
