name: Task 8 GREEN Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Produce exact Ruff output
        run: |
          uv run ruff format src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion --fix > task8-green-lint.txt 2>&1 || true
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion >> task8-green-lint.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task8-green-formatted-files
          path: |
            src/gemini_trading/data/ingestion
            tests/unit/data/ingestion
            task8-green-lint.txt
          if-no-files-found: error
          retention-days: 1
