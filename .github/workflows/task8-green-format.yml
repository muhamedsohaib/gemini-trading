name: Task 8 GREEN Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Bind cursor and apply exact Ruff output
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/gemini_trading/data/ingestion/service.py")
          content = path.read_text()
          first = "lambda: self._provider.fetch_klines("
          second = "\n                        cursor,\n"
          if content.count(first) != 1 or content.count(second) < 1:
              raise SystemExit("expected cursor tokens not found")
          content = content.replace(
              first,
              "lambda current_cursor=cursor: self._provider.fetch_klines(",
              1,
          )
          content = content.replace(second, "\n                        current_cursor,\n", 1)
          path.write_text(content)
          PY
          uv run ruff format src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion --fix
          uv run ruff format --check src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/data/ingestion tests/unit/data/ingestion
          git diff --cached --quiet || git commit -m "fix: bind Task 8 retry cursor"
          git push origin HEAD:${{ github.head_ref }}
