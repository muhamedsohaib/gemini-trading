name: Task 8 GREEN Format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply repository-pinned Ruff output
        run: |
          uv run ruff format src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion --fix
          uv run ruff format --check src/gemini_trading/data/ingestion tests/unit/data/ingestion
          uv run ruff check src/gemini_trading/data/ingestion tests/unit/data/ingestion
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/data/ingestion tests/unit/data/ingestion
          git diff --cached --quiet || git commit -m "style: normalize Task 8 ingestion files"
          git push origin HEAD:${{ github.head_ref }}
