name: Task 9 Full Pytest Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture full pytest output
        run: uv run pytest -q > task9-full-pytest.txt 2>&1 || true
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task9-full-pytest
          path: task9-full-pytest.txt
          if-no-files-found: error
          retention-days: 1
