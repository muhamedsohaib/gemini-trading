name: Task 9 GREEN Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Task 9 candidate outputs
        run: |
          set +e
          python - <<'PY' > task9-patch.txt 2>&1
          from pathlib import Path

          path = Path("src/gemini_trading/data/storage/local_immutable.py")
          content = path.read_text()
          function_marker = "\n\ndef _page_metadata_payload(page: RawPage) -> dict[str, object]:"
          function = """

          def serialize_retrieval_manifest(manifest: RetrievalManifest) -> bytes:
              \"\"\"Serialize a retrieval manifest using its deterministic storage encoding.\"\"\"

              return _json_bytes(_manifest_payload(manifest))
          """
          if function_marker not in content:
              raise SystemExit("retrieval serializer insertion point not found")
          content = content.replace(function_marker, function + function_marker, 1)
          old_write = "return write_immutable(path, _json_bytes(_manifest_payload(manifest)))"
          if content.count(old_write) != 1:
              raise SystemExit("retrieval manifest writer pattern not found")
          content = content.replace(
              old_write,
              "return write_immutable(path, serialize_retrieval_manifest(manifest))",
              1,
          )
          method_marker = "    def read_run(self, run_id: str) -> tuple[RetrievalManifest, tuple[RawPage, ...]]:"
          method = """    def read_retrieval_manifest_bytes(self, run_id: str) -> bytes:
              path = self._raw_run_directory(run_id) / \"retrieval-manifest.json\"
              return path.read_bytes()

          """
          if method_marker not in content:
              raise SystemExit("retrieval reader insertion point not found")
          content = content.replace(method_marker, method + method_marker, 1)
          path.write_text(content)
          print("patch applied")
          PY
          echo "patch_status=$?" >> task9-patch.txt
          uv run ruff format src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py > task9-format.txt 2>&1
          echo "format_status=$?" >> task9-format.txt
          uv run ruff check src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py --fix > task9-lint.txt 2>&1
          echo "lint_status=$?" >> task9-lint.txt
          uv run pyright > task9-pyright.txt 2>&1
          echo "pyright_status=$?" >> task9-pyright.txt
          uv run pytest tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py tests/unit/data/storage tests/unit/data/datasets tests/unit/data/validation tests/property tests/regression tests/unit/safety -q > task9-pytest.txt 2>&1
          echo "pytest_status=$?" >> task9-pytest.txt
          exit 0
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: task9-green-diagnostic
          path: |
            task9-*.txt
            src/gemini_trading/data/ingestion/replay.py
            src/gemini_trading/data/verification
            src/gemini_trading/data/storage/base.py
            src/gemini_trading/data/storage/local_immutable.py
            tests/unit/data/ingestion/test_replay.py
            tests/unit/data/verification/test_service.py
            tests/integration/test_replay_without_network.py
          if-no-files-found: error
          retention-days: 1
