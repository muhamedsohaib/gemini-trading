name: Task 9 GREEN Cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Preserve base protocols and verify Task 9
        run: |
          python - <<'PY'
          from pathlib import Path

          base = Path("src/gemini_trading/data/storage/base.py")
          base.write_text('''"""Storage protocols for immutable market-data evidence and datasets."""\n\nfrom pathlib import Path\nfrom typing import Protocol\n\nfrom gemini_trading.domain.dataset import RawPage, RetrievalManifest\n\n\nclass RawStore(Protocol):\n    """Immutable persistence contract for provider evidence."""\n\n    def write_page(self, page: RawPage) -> Path: ...\n\n    def write_retrieval_manifest(self, manifest: RetrievalManifest) -> Path: ...\n\n    def read_run(self, run_id: str) -> tuple[RetrievalManifest, tuple[RawPage, ...]]: ...\n\n\nclass CanonicalStore(Protocol):\n    """Immutable persistence contract for canonical datasets and provenance."""\n\n    def write_dataset(\n        self,\n        dataset_id: str,\n        jsonl_bytes: bytes,\n        manifest_bytes: bytes,\n    ) -> tuple[Path, Path]: ...\n\n    def write_provenance(\n        self,\n        dataset_id: str,\n        run_id: str,\n        receipt_bytes: bytes,\n    ) -> Path: ...\n''')

          local = Path("src/gemini_trading/data/storage/local_immutable.py")
          content = local.read_text()
          function_marker = "\n\ndef _page_metadata_payload(page: RawPage) -> dict[str, object]:"
          function = """

          def serialize_retrieval_manifest(manifest: RetrievalManifest) -> bytes:
              \"\"\"Serialize a retrieval manifest using its deterministic storage encoding.\"\"\"

              return _json_bytes(_manifest_payload(manifest))
          """
          if "def serialize_retrieval_manifest(" not in content:
              content = content.replace(function_marker, function + function_marker, 1)
          content = content.replace(
              "return write_immutable(path, _json_bytes(_manifest_payload(manifest)))",
              "return write_immutable(path, serialize_retrieval_manifest(manifest))",
              1,
          )
          method_marker = "    def read_run(self, run_id: str) -> tuple[RetrievalManifest, tuple[RawPage, ...]]:"
          method = (
              "    def read_retrieval_manifest_bytes(self, run_id: str) -> bytes:\n"
              "        path = self._raw_run_directory(run_id) / \"retrieval-manifest.json\"\n"
              "        return path.read_bytes()\n\n"
          )
          if "def read_retrieval_manifest_bytes(" not in content:
              content = content.replace(method_marker, method + method_marker, 1)
          local.write_text(content)

          replay = Path("src/gemini_trading/data/ingestion/replay.py")
          content = replay.read_text()
          content = content.replace("from datetime import UTC, datetime\n", "from datetime import UTC, datetime\nfrom pathlib import Path\nfrom typing import Protocol\n")
          content = content.replace("from gemini_trading.data.storage.base import CanonicalStore, RawStore\n", "")
          content = content.replace("def _load_verified_run(", "def load_verified_run(")
          content = content.replace("def _reconstruct_completed_candles(", "def reconstruct_completed_candles(")
          content = content.replace("_load_verified_run(self.raw_store, run_id)", "load_verified_run(self.raw_store, run_id)")
          content = content.replace("_reconstruct_completed_candles(manifest, pages)", "reconstruct_completed_candles(manifest, pages)")
          protocol_marker = "\n\ndef _utc_now() -> datetime:"
          protocols = '''

          class ReplayRawStore(Protocol):
              """Readable immutable raw evidence required for offline replay."""

              def read_run(
                  self,
                  run_id: str,
              ) -> tuple[RetrievalManifest, tuple[RawPage, ...]]: ...

              def read_retrieval_manifest_bytes(self, run_id: str) -> bytes: ...


          class ReplayCanonicalStore(Protocol):
              """Canonical publication operations required by offline replay."""

              def write_dataset(
                  self,
                  dataset_id: str,
                  jsonl_bytes: bytes,
                  manifest_bytes: bytes,
              ) -> tuple[Path, Path]: ...

              def write_provenance(
                  self,
                  dataset_id: str,
                  run_id: str,
                  receipt_bytes: bytes,
              ) -> Path: ...
          '''
          if "class ReplayRawStore(" not in content:
              content = content.replace(protocol_marker, protocols + protocol_marker, 1)
          content = content.replace("raw_store: RawStore", "raw_store: ReplayRawStore")
          content = content.replace("canonical_store: CanonicalStore", "canonical_store: ReplayCanonicalStore")
          content = content.replace("    raw_store: RawStore\n", "    raw_store: ReplayRawStore\n")
          content = content.replace("    canonical_store: CanonicalStore\n", "    canonical_store: ReplayCanonicalStore\n")
          replay.write_text(content)

          verification = Path("src/gemini_trading/data/verification/service.py")
          content = verification.read_text()
          content = content.replace("from typing import cast\n", "from typing import Protocol, cast\n")
          content = content.replace("from gemini_trading.data.storage.base import CanonicalStore, RawStore\n", "")
          content = content.replace(
              "    _load_verified_run,\n    _reconstruct_completed_candles,",
              "    ReplayRawStore,\n    load_verified_run,\n    reconstruct_completed_candles,",
          )
          content = content.replace(
              "    load_verified_run,\n    reconstruct_completed_candles,",
              "    ReplayRawStore,\n    load_verified_run,\n    reconstruct_completed_candles,",
              1,
          )
          content = content.replace("_load_verified_run(", "load_verified_run(")
          content = content.replace("_reconstruct_completed_candles(", "reconstruct_completed_candles(")
          protocol_marker = "\n\ndef _json_object(raw: bytes, description: str) -> dict[str, object]:"
          protocol = '''

          class VerificationCanonicalStore(Protocol):
              """Readable canonical artifacts required for independent verification."""

              def read_dataset(self, dataset_id: str) -> tuple[bytes, bytes]: ...

              def read_provenance(self, dataset_id: str, run_id: str) -> bytes: ...
          '''
          if "class VerificationCanonicalStore(" not in content:
              content = content.replace(protocol_marker, protocol + protocol_marker, 1)
          content = content.replace("raw_store: RawStore", "raw_store: ReplayRawStore")
          content = content.replace("canonical_store: CanonicalStore", "canonical_store: VerificationCanonicalStore")
          verification.write_text(content)
          PY
          uv run ruff format src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py
          uv run ruff check src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py --fix
          uv run ruff format --check src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py
          uv run ruff check src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py
          uv run pyright
          uv run pytest tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py tests/unit/data/storage tests/unit/data/datasets tests/unit/data/validation tests/property tests/regression tests/unit/safety -q
          rm -f .github/workflows/task9-red-pyright.yml .github/workflows/task9-green-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/data/ingestion/replay.py src/gemini_trading/data/verification src/gemini_trading/data/storage/base.py src/gemini_trading/data/storage/local_immutable.py tests/unit/data/ingestion/test_replay.py tests/unit/data/verification/test_service.py tests/integration/test_replay_without_network.py .github/workflows
          git commit -m "feat: replay and verify canonical market data"
          git push origin HEAD:${{ github.head_ref }}
