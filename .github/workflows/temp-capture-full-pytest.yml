name: Temporary full pytest capture

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - shell: bash
        run: |
          set +e
          uv run pytest -q --tb=short > reports/verification/full-pytest-diagnostic.txt 2>&1
          status=$?
          printf '\nexit_code=%s\n' "$status" >> reports/verification/full-pytest-diagnostic.txt
          rm .github/workflows/temp-capture-full-pytest.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/verification/full-pytest-diagnostic.txt .github/workflows/temp-capture-full-pytest.yml
          git commit -m "chore: capture full pytest regression"
          git push origin HEAD:feature/deterministic-backtesting-engine
