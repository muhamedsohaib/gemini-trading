name: Temporary Task 12 lint repair

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - run: >-
          uv run ruff check --fix --unsafe-fixes
          src/gemini_trading/cli/research.py
          src/gemini_trading/research/replay.py
      - run: >-
          uv run ruff format
          src/gemini_trading/cli/research.py
          src/gemini_trading/research/replay.py
      - shell: bash
        run: |
          rm reports/verification/full-lint-diagnostic.txt
          rm .github/workflows/temp-fix-task12-lint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/cli/research.py src/gemini_trading/research/replay.py reports/verification/full-lint-diagnostic.txt .github/workflows/temp-fix-task12-lint.yml
          git commit -m "fix: clear Task 11 and Task 12 lint gates"
          git push origin HEAD:feature/deterministic-backtesting-engine
