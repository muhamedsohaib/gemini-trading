name: Temporary documentation acceptance formatter

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - run: uv run ruff format tests/acceptance/test_deterministic_backtesting_documentation.py
      - shell: bash
        run: |
          rm .github/workflows/temp-format-doc-acceptance.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/acceptance/test_deterministic_backtesting_documentation.py .github/workflows/temp-format-doc-acceptance.yml
          git commit -m "style: format deterministic documentation acceptance"
          git push origin HEAD:feature/deterministic-backtesting-engine
