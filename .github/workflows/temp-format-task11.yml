name: Temporary Task 11 formatter

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - name: Apply repository-pinned formatting
        run: >-
          uv run ruff format
          src/gemini_trading/research/replay.py
          src/gemini_trading/research/verification.py
          tests/property/test_result_identity.py
          tests/unit/research/test_metrics.py
      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/temp-format-task11.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/research/replay.py src/gemini_trading/research/verification.py tests/property/test_result_identity.py tests/unit/research/test_metrics.py .github/workflows/temp-format-task11.yml
          git diff --cached --quiet && exit 0
          git commit -m "style: normalize Task 11 replay verification"
          git push origin HEAD:feature/deterministic-backtesting-engine
