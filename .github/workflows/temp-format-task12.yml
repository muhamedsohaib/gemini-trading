name: Temporary Task 12 formatter

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine
    paths:
      - .github/workflows/temp-format-task12.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff format src/gemini_trading/cli/main.py src/gemini_trading/cli/research.py
      - run: rm .github/workflows/temp-format-task12.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gemini_trading/cli/main.py src/gemini_trading/cli/research.py .github/workflows/temp-format-task12.yml
          git commit -m "style: format Task 12 research CLI"
          git push origin HEAD:feature/deterministic-backtesting-engine
