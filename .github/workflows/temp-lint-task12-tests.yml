name: Temporary Task 12 test lint fixer

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine

permissions:
  contents: write

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - run: >-
          uv run ruff check --fix
          tests/unit/cli/test_research.py
          tests/acceptance/test_research_backtest_cli.py
      - run: >-
          uv run ruff format
          tests/unit/cli/test_research.py
          tests/acceptance/test_research_backtest_cli.py
      - shell: bash
        run: |
          rm .github/workflows/temp-lint-task12-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/cli/test_research.py tests/acceptance/test_research_backtest_cli.py .github/workflows/temp-lint-task12-tests.yml
          git commit -m "style: normalize Task 12 red test lint"
          git push origin HEAD:feature/deterministic-backtesting-engine
