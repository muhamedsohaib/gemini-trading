name: Temporary Task 12 acceptance evidence

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine
    paths:
      - .github/workflows/temp-task12-acceptance-evidence.yml

permissions:
  contents: write

jobs:
  acceptance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - shell: bash
        run: |
          set -euo pipefail
          tested_head=$(git rev-parse HEAD)
          output=$(uv run pytest tests/acceptance/test_research_backtest_cli.py tests/integration/test_backtest_replay_without_network.py tests/unit/research/test_verification.py -q 2>&1)
          git diff --check
          cat > reports/verification/deterministic-backtesting-task12-acceptance.md <<EOF
          # Task 12 Deterministic Acceptance Evidence

          - Tested branch head: \`$tested_head\`
          - GitHub Actions run: \`${GITHUB_RUN_ID}\`
          - Runtime: Python 3.12 on GitHub-hosted Ubuntu 24.04
          - Workflow: safe read-only CLI backtest, provider-free replay, independent verification, tamper detection, diagnostic non-promotion, and live-mode rejection.
          - Result: passed.

          ## Focused test output

          \`\`\`text
          $output
          \`\`\`

          ## Safety boundary

          No credentials, private endpoints, paper broker, demo adapter, live exchange submission, leverage, futures, shorting, or production strategy were exercised or introduced.
          EOF
          rm .github/workflows/temp-task12-acceptance-evidence.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/verification/deterministic-backtesting-task12-acceptance.md .github/workflows/temp-task12-acceptance-evidence.yml
          git commit -m "test: record Task 12 deterministic acceptance"
          git push origin HEAD:feature/deterministic-backtesting-engine
