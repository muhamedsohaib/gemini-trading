name: Temporary Task 12 Pyright diagnostic

on:
  push:
    branches:
      - feature/deterministic-backtesting-engine
    paths:
      - .github/workflows/temp-task12-pyright-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: feature/deterministic-backtesting-engine
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-groups --frozen
      - shell: bash
        run: |
          set +e
          uv run pyright > reports/verification/task12-pyright-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> reports/verification/task12-pyright-diagnostic.txt
          rm .github/workflows/temp-task12-pyright-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/verification/task12-pyright-diagnostic.txt .github/workflows/temp-task12-pyright-diagnostic.yml
          git commit -m "test: record Task 12 strict typing diagnostic"
          git push origin HEAD:feature/deterministic-backtesting-engine
