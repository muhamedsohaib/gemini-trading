name: Verify exact merged deterministic backtesting commit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  exact-merged-main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77
          fetch-depth: 0
      - name: Assert exact protected main commit before verification
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77"
          test -z "$(git status --porcelain)"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Run focused deterministic milestone acceptance
        run: >-
          uv run pytest
          tests/acceptance/test_research_backtest_cli.py
          tests/integration/test_backtest_replay_without_network.py
          tests/unit/research/test_verification.py
          tests/acceptance/test_deterministic_backtesting_documentation.py
          -q
      - run: uv run pytest
      - run: uv run pre-commit run --all-files
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run python -m build
      - run: uv run pip-audit
      - name: Validate tracked-file policy
        run: >-
          uv run python -c "import subprocess;
          from gemini_trading.safety.repository_policy import validate_tracked_paths;
          validate_tracked_paths(subprocess.check_output(['git','ls-files'], text=True).splitlines())"
      - name: Scan exact merged files for secrets
        run: uv run pre-commit run detect-secrets --all-files
      - name: Verify CLI help surfaces
        shell: bash
        run: |
          uv run gemini-trading --help
          uv run gemini-trading research --help
          uv run gemini-trading research backtest --help
          uv run gemini-trading research replay --help
          uv run gemini-trading research verify --help
      - name: Assert exact clean commit after verification
        shell: bash
        run: |
          git diff --check
          test -z "$(git status --porcelain)"
          test "$(git rev-parse HEAD)" = "f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77"

  exact-merged-gitleaks:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77
          fetch-depth: 0
      - name: Assert exact protected main commit
        shell: bash
        run: test "$(git rev-parse HEAD)" = "f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77"
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
