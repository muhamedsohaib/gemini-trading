name: Temporary Pytest Diagnostic

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture focused Pytest output
        run: >-
          uv run pytest
          tests/unit/strategy/test_policy.py
          tests/unit/strategy/test_contracts.py
          tests/unit/strategy/test_errors.py
          tests/unit/strategy/test_identity.py
          tests/property/strategy/test_strategy_identity.py
          -vv > pytest-output.txt 2>&1 || true
      - name: Publish Pytest output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file pytest-output.txt
