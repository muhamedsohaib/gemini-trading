name: Temporary Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture concise diagnostic
        run: |
          mkdir -p reports/temporary
          uv run ruff check . --output-format concise > reports/temporary/task-three-ruff.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          git add reports/temporary/task-three-ruff.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: persist task three ruff diagnostic"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
