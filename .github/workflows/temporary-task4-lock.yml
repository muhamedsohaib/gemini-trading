name: Temporary Task 4 Lock Application

on:
  pull_request:

permissions:
  contents: write

jobs:
  lock:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv lock
      - run: uv sync --all-groups --frozen
      - name: Verify deterministic ML imports
        run: >-
          uv run python -c
          "import numpy, sklearn, threadpoolctl; print(numpy.__version__, sklearn.__version__, threadpoolctl.__version__)"
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "build: lock deterministic model dependencies"
          file_pattern: uv.lock
