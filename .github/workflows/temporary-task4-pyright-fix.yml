name: Temporary Task 4 Pyright Cast Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Remove redundant Any casts
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/gemini_trading/strategy/models.py')
          text = path.read_text()
          text = text.replace('estimators = cast(Any, estimator.estimators_)', 'estimators = estimator.estimators_')
          text = text.replace('_extract_tree(cast(Any, estimators[index, 0]))', '_extract_tree(estimators[index, 0])')
          text = text.replace('cast(Any, estimator)._raw_predict_init', 'estimator._raw_predict_init')
          text = text.replace('tree = cast(Any, estimator.tree_)', 'tree = estimator.tree_')
          path.write_text(text)
          PY
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "fix: remove redundant model casts"
          file_pattern: src/gemini_trading/strategy/models.py
