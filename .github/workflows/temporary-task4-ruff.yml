name: Temporary Task 4 Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Capture Ruff output
        run: |
          mkdir -p reports/temporary
          uv run ruff check . --output-format concise > reports/temporary/task4-ruff.txt 2>&1 || true
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: persist task four ruff diagnostic"
          file_pattern: reports/temporary/task4-ruff.txt
