name: Temporary Task 5 Interface Discovery

on:
  pull_request:

permissions:
  contents: write

jobs:
  discover:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Capture strategy interfaces
        run: |
          mkdir -p reports/temporary
          {
            echo '## Source files'
            find src/gemini_trading -type f -name '*.py' | sort
            echo
            echo '## Strategy and context symbols'
            grep -R -n -E 'class StrategyContext|class .*Strategy|Protocol|def on_candle|OrderIntent|StrategyAction' src/gemini_trading || true
          } > reports/temporary/task5-interfaces.txt
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: persist task five interface discovery"
          file_pattern: reports/temporary/task5-interfaces.txt
