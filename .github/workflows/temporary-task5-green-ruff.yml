name: Temporary Task 5 Green Ruff Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply exact SIM102 correction
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/gemini_trading/strategy/arbitration.py")
          text = path.read_text()
          old = """        if self.action in {StrategyAction.EXIT_TO_CASH, StrategyAction.REMAIN_IN_CASH}:
              if self.action is StrategyAction.REMAIN_IN_CASH and self.active_specialist is not None:
                  raise ValueError(\"cash decision cannot retain an active specialist\")
          """
          new = """        if (
              self.action is StrategyAction.REMAIN_IN_CASH
              and self.active_specialist is not None
          ):
              raise ValueError(\"cash decision cannot retain an active specialist\")
          """
          if old not in text:
              raise SystemExit("expected validation block not found")
          path.write_text(text.replace(old, new))
          PY
      - run: uv run ruff check src/gemini_trading/strategy/arbitration.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "style: collapse candidate cash validation"
          file_pattern: src/gemini_trading/strategy/arbitration.py
