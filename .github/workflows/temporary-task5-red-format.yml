name: Temporary Task 5 Red Formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: >-
          uv run ruff format
          tests/unit/strategy/test_regimes.py
          tests/unit/strategy/test_arbitration.py
          tests/unit/strategy/test_candidate_strategy.py
          tests/property/strategy/test_candidate_order_safety.py
          tests/regression/test_candidate_next_candle_only.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "style: format task five red tests"
          file_pattern: "tests/unit/strategy/test_regimes.py tests/unit/strategy/test_arbitration.py tests/unit/strategy/test_candidate_strategy.py tests/property/strategy/test_candidate_order_safety.py tests/regression/test_candidate_next_candle_only.py"
