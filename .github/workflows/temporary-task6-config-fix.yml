name: Temporary Task 6 Config Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Add sizing assumptions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/gemini_trading/strategy/baselines.py')
          lines = path.read_text().splitlines()
          marker = '            ("decision_count", str(len(self.schedule.actions))),'
          additions = [
              '            ("quantity_step", format(self.quantity_step, "f")),',
              '            ("minimum_quantity", format(self.minimum_quantity, "f")),',
              '            ("minimum_notional", format(self.minimum_notional, "f")),',
          ]
          if additions[0] not in lines:
              try:
                  index = lines.index(marker)
              except ValueError:
                  raise SystemExit('decision_count marker not found') from None
              lines[index + 1:index + 1] = additions
              path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit fix
        run: |
          git add src/gemini_trading/strategy/baselines.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: include baseline sizing assumptions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
