name: Temporary Task 6 Fixture Discovery

on:
  pull_request:

permissions:
  contents: write

jobs:
  discover:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Capture backtest fixture references
        run: |
          mkdir -p reports/temporary
          {
            echo '## Candidate files'
            find tests -type f -name '*.py' | sort
            echo
            echo '## VerifiedDataset and BacktestEngine references'
            grep -R -n -E 'VerifiedDataset|BacktestEngine|ExperimentManifest|simulation_config_sha256' tests | head -n 400 || true
          } > reports/temporary/task6-discovery.txt
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: persist task six fixture discovery"
          file_pattern: reports/temporary/task6-discovery.txt
