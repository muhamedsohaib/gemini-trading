name: Temporary Task 6 Green Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply tested baseline changes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/gemini_trading/strategy/baselines.py")
          text = path.read_text()

          text = text.replace(
              '_CONTEXT = Context(prec=34, rounding=ROUND_HALF_EVEN)\n',
              '_CONTEXT = Context(prec=34, rounding=ROUND_HALF_EVEN)\n'
              '_INITIAL_STOP_ATR = Decimal("2.5")\n'
              '_TRAILING_STOP_ATR = Decimal("3.0")\n',
          )

          old_configuration = '''        return (
              ("strategy_id", self.strategy_id),
              ("decision_count", str(len(self.schedule.actions))),
              ("timing", "next_candle_via_research_engine"),
              ("production_eligible", "false"),
          )
          '''
          new_configuration = '''        return (
              ("strategy_id", self.strategy_id),
              ("decision_count", str(len(self.schedule.actions))),
              ("quantity_step", format(self.quantity_step, "f")),
              ("minimum_quantity", format(self.minimum_quantity, "f")),
              ("minimum_notional", format(self.minimum_notional, "f")),
              ("timing", "next_candle_via_research_engine"),
              ("production_eligible", "false"),
          )
          '''
          if old_configuration not in text:
              raise SystemExit("configuration block not found")
          text = text.replace(old_configuration, new_configuration)

          marker = '''def _cash_schedule(count: int) -> BaselineSchedule:
          '''
          helpers = '''def _true_range(candles: tuple[Candle, ...], index: int) -> Decimal:
              candle = candles[index]
              if index == 0:
                  return candle.high - candle.low
              previous_close = candles[index - 1].close
              return max(
                  candle.high - candle.low,
                  abs(candle.high - previous_close),
                  abs(candle.low - previous_close),
              )


          def _atr24(candles: tuple[Candle, ...], index: int) -> Decimal | None:
              if index < 23:
                  return None
              with localcontext(_CONTEXT):
                  return sum(
                      (
                          _true_range(candles, item_index)
                          for item_index in range(index - 23, index + 1)
                      ),
                      Decimal("0"),
                  ) / Decimal("24")


          def _cash_schedule(count: int) -> BaselineSchedule:
          '''
          if marker not in text:
              raise SystemExit("cash schedule marker not found")
          text = text.replace(marker, helpers, 1)

          start = text.index("def _zscore_schedule(")
          end = text.index("def build_baseline_schedules(", start)
          replacement = '''def _zscore_schedule(candles: tuple[Candle, ...]) -> BaselineSchedule:
              actions: list[BaselineAction] = []
              currently_long = False
              highest_close: Decimal | None = None
              stop: Decimal | None = None
              with localcontext(_CONTEXT):
                  for index, candle in enumerate(candles):
                      atr = _atr24(candles, index)
                      if index < 23:
                          should_be_long = currently_long
                      else:
                          window = tuple(item.close for item in candles[index - 23 : index + 1])
                          mean = sum(window, Decimal("0")) / Decimal(len(window))
                          variance = sum((value - mean) ** 2 for value in window) / Decimal(
                              len(window)
                          )
                          zscore = None if variance == 0 else (candle.close - mean) / variance.sqrt()
                          if currently_long:
                              stop_hit = stop is not None and candle.low <= stop
                              should_be_long = not stop_hit and (
                                  zscore is None or zscore < Decimal("0")
                              )
                          else:
                              should_be_long = (
                                  zscore is not None and zscore <= Decimal("-1.5")
                              )
                      action, next_long = _state_action(currently_long, should_be_long)
                      if action is BaselineAction.ENTER_LONG:
                          if atr is None:
                              raise ValueError("mean-reversion entry requires ATR24")
                          highest_close = candle.close
                          stop = candle.close - _INITIAL_STOP_ATR * atr
                          if stop <= 0:
                              action = BaselineAction.CASH
                              next_long = False
                              highest_close = None
                              stop = None
                      elif action is BaselineAction.HOLD_LONG:
                          if atr is None or highest_close is None or stop is None:
                              raise ValueError(
                                  "mean-reversion hold requires ATR24 and stop state"
                              )
                          highest_close = max(highest_close, candle.close)
                          stop = max(stop, highest_close - _TRAILING_STOP_ATR * atr)
                      elif action is BaselineAction.EXIT_TO_CASH:
                          highest_close = None
                          stop = None
                      currently_long = next_long
                      actions.append(action)
              return BaselineSchedule("mean_reversion_z24.v1", tuple(actions))


          def _validate_candles(candles: tuple[Candle, ...]) -> None:
              for index, candle in enumerate(candles):
                  if not candle.completed:
                      raise ValueError("baseline schedules require completed candles")
                  if index == 0:
                      continue
                  previous = candles[index - 1]
                  if (
                      candle.instrument != previous.instrument
                      or candle.timeframe is not previous.timeframe
                  ):
                      raise ValueError(
                          "baseline candles must share instrument and timeframe"
                      )
                  if candle.open_time <= previous.open_time:
                      raise ValueError("baseline candles must be strictly chronological")


          '''
          text = text[:start] + replacement + text[end:]
          text = text.replace(
              '    if any(not candle.completed for candle in candles):\n'
              '        raise ValueError("baseline schedules require completed candles")\n',
              '    _validate_candles(candles)\n',
          )
          path.write_text(text)
          PY
      - run: uv run ruff format src/gemini_trading/strategy/baselines.py
      - run: uv run ruff check src/gemini_trading/strategy/baselines.py
      - run: >-
          uv run pytest -q -o addopts=''
          tests/unit/strategy/test_baselines.py
          tests/integration/test_strategy_baseline_engine.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "feat: complete baseline risk and identity rules"
          file_pattern: src/gemini_trading/strategy/baselines.py
