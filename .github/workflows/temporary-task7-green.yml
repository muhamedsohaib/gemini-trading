name: Temporary Task 7 Green

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - name: Apply research-result-v2 migration in runner
        run: |
          python - <<'PY'
          from pathlib import Path

          artifacts = Path('src/gemini_trading/research/artifacts.py')
          text = artifacts.read_text().replace('research-result-v1', 'research-result-v2')
          trade_marker = '        "exit_fill_ids": list(trade.exit_fill_ids),\n'
          trade_fields = (
              '        "entry_candle_index": trade.entry_candle_index,\n'
              '        "exit_candle_index": trade.exit_candle_index,\n'
              '        "hold_candles": trade.hold_candles,\n'
              '        "gross_return": trade.gross_return,\n'
              '        "net_return": trade.net_return,\n'
          )
          if '"entry_candle_index": trade.entry_candle_index' not in text:
              text = text.replace(trade_marker, trade_marker + trade_fields, 1)
          metric_marker = '        "exposure_fraction": metrics.exposure_fraction,\n'
          metric_fields = (
              '        "observed_periods": metrics.observed_periods,\n'
              '        "annualized_geometric_return": metrics.annualized_geometric_return,\n'
              '        "annualized_volatility": metrics.annualized_volatility,\n'
              '        "downside_deviation": metrics.downside_deviation,\n'
              '        "sortino_ratio": metrics.sortino_ratio,\n'
              '        "return_to_drawdown": metrics.return_to_drawdown,\n'
              '        "turnover": metrics.turnover,\n'
              '        "exposure_adjusted_return": metrics.exposure_adjusted_return,\n'
              '        "profit_factor": metrics.profit_factor,\n'
          )
          if '"observed_periods": metrics.observed_periods' not in text:
              text = text.replace(metric_marker, metric_marker + metric_fields, 1)
          artifacts.write_text(text)

          verification = Path('src/gemini_trading/research/verification.py')
          verification.write_text(
              verification.read_text().replace('research-result-v1', 'research-result-v2')
          )
          PY
      - run: >-
          uv run ruff format
          src/gemini_trading/research/artifacts.py
          src/gemini_trading/research/verification.py
          src/gemini_trading/strategy/evaluation.py
          tests/unit/research/test_artifacts.py
          tests/unit/strategy/test_evaluation_metrics.py
          tests/unit/strategy/test_promotion_gates.py
          tests/property/strategy/test_cost_monotonicity.py
      - run: |
          mkdir -p reports/temporary
          uv run pyright > reports/temporary/task7-pyright.txt 2>&1 || true
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: persist task seven pyright diagnostic"
          file_pattern: reports/temporary/task7-pyright.txt
