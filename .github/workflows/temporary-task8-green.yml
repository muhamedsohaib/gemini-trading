name: Temporary Task 8 Green

on:
  pull_request:

permissions:
  contents: write

jobs:
  green:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --all-groups --frozen
      - run: >-
          uv run ruff format
          src/gemini_trading/strategy/study.py
          tests/integration/test_strategy_walk_forward_study.py
          tests/integration/test_strategy_ablation_suite.py
          tests/regression/test_final_test_seal.py
      - run: uv run ruff check src/gemini_trading/strategy/study.py tests/integration/test_strategy_walk_forward_study.py tests/integration/test_strategy_ablation_suite.py tests/regression/test_final_test_seal.py
      - run: uv run pyright
      - run: >-
          uv run pytest -q -o addopts=''
          tests/integration/test_strategy_walk_forward_study.py
          tests/integration/test_strategy_ablation_suite.py
          tests/regression/test_final_test_seal.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "feat: run sealed multi model strategy studies"
          file_pattern: src/gemini_trading/strategy/study.py tests/integration/test_strategy_walk_forward_study.py tests/integration/test_strategy_ablation_suite.py tests/regression/test_final_test_seal.py
