name: Verify exact merged main

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/verify-merged-main-exact.yml
      - reports/verification/post-merge-verification-request.md

permissions:
  contents: read

jobs:
  exact-main-quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.25"
          enable-cache: true
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - run: test "$(git rev-parse HEAD)" = "f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77"
      - run: uv sync --all-groups --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: uv run python -m build
      - run: uv run pip-audit
      - name: Validate tracked-file policy
        run: >-
          uv run python -c "import subprocess;
          from gemini_trading.safety.repository_policy import validate_tracked_paths;
          validate_tracked_paths(subprocess.check_output(['git','ls-files'], text=True).splitlines())"
      - name: Scan tracked files for secrets
        run: uv run pre-commit run detect-secrets --all-files
      - run: git diff --check
      - run: test -z "$(git status --short)"

  exact-main-gitleaks:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77
          fetch-depth: 0
      - run: test "$(git rev-parse HEAD)" = "f2bb5b0ef4f68fb3d3ba88c5fc3867e55b8a7a77"
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
